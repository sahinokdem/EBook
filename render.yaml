services:
  - type: pserv
    name: ebook-db
    env: docker
    plan: free
    region: frankfurt
    databases:
      - name: ebook
        user: ebook_user

  - type: web
    name: ebook-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "bash -c 'alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ebook-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: MAX_UPLOAD_SIZE
        value: 52428800
