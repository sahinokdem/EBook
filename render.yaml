services:
  - type: web
    name: ebook-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: "postgresql://ebook_user:Rgs7UULeLrFoIrR2th6LttgKhPhtkrNM@dpg-d59rts75r7bs739f8dn0-a.frankfurt-postgres.render.com/ebook_cwfp"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: MAX_UPLOAD_SIZE
        value: 52428800
